  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --tomato:    #e85d45;
      --tomato-dk: #c94332;
      --leaf:      #4caf7d;
      --bg:        #f7f0eb;
      --card:      #fffcfa;
      --text:      #2e2420;
      --muted:     #a08880;
      --subtle:    #ecddd8;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Georgia', serif;
      color: var(--text);
      padding: 2rem 1.25rem;
    }

    /* ── card ── */
    .card {
      width: min(660px, 100%);
      background: var(--card);
      border-radius: 2rem;
      padding: 3.2rem 4rem 3rem;
      box-shadow: 0 10px 50px rgba(46, 36, 32, 0.09);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── header ── */
    .header {
      text-align: center;
      margin-bottom: 2.6rem;
    }

    .header-title {
      font-size: 2.4rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1;
    }

    .header-title span {
      color: var(--tomato);
    }

    .header-sub {
      margin-top: 0.45rem;
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── toolbar: mode tabs + divider + customize ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 3rem;
      background: var(--bg);
      border-radius: 999px;
      padding: 0.35rem;
    }

    .mode-btn {
      padding: 0.52rem 1.35rem;
      border: none;
      border-radius: 999px;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .mode-btn:hover { color: var(--tomato); }

    .mode-btn.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(46,36,32,0.1);
    }

    .toolbar-divider {
      width: 1px;
      height: 1.4rem;
      background: var(--subtle);
      flex-shrink: 0;
    }

    .customize-btn {
      padding: 0.52rem 1.1rem;
      border: none;
      border-radius: 999px;
      background: transparent;
      font-family: inherit;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .customize-btn:hover { color: var(--tomato); }

    .customize-btn svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ── ring ── */
    .ring-wrap {
      position: relative;
      width: 310px;
      height: 310px;
      margin-bottom: 3rem;
    }

    svg.ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track    { fill: none; stroke: var(--subtle); stroke-width: 10; }
    .ring-progress {
      fill: none;
      stroke: var(--tomato);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.4s;
    }
    .ring-progress.done { stroke: var(--leaf); }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .tomato-icon {
      font-size: 2rem;
      margin-bottom: 0.4rem;
      transition: transform 0.3s;
    }

    .tomato-icon.pulse { animation: pulse 2s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }

    .time-display {
      font-size: 4.8rem;
      font-weight: normal;
      letter-spacing: 0.03em;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .time-label {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── controls ── */
    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 999px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.18s;

    .btn-start {
      padding: 0.95rem 3.2rem;
      background: var(--tomato);

      font-size: 1.05rem;

    .btn-flat {

      letter-spacing: 0.06em;

    .btn-flat:hover { border-color: var(--muted); color: var(--text); }

    /* ── breathe ── */

      margin-top: 2rem;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      color: var(--muted);

    /* ── modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(46,36,32,0.3);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: 1.6rem;
      padding: 2.2rem 2.5rem 2rem;
      width: min(360px, 92vw);
      box-shadow: 0 16px 50px rgba(46,36,32,0.16);
      animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-title {
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.8rem;
      text-align: center;
    }

    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--subtle);
    }

    .field:last-of-type { border-bottom: none; }

    .field label {
      font-size: 1rem;
      color: var(--text);
    }

    .field-input-wrap {
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .stepper {
      width: 30px; height: 30px;
      border: 1.5px solid var(--subtle);
      border-radius: 50%;
      background: transparent;
      font-size: 1.1rem;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      padding: 0;
    }

    .stepper:hover { border-color: var(--tomato); color: var(--tomato); }

    .min-input {
      width: 50px;
      text-align: center;
      border: 1.5px solid var(--subtle);
      border-radius: 0.5rem;
      padding: 0.3rem 0;
      font-family: inherit;
      font-size: 1.05rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
    }

    .min-input:focus { border-color: var(--tomato); }
    .min-input::-webkit-inner-spin-button,
    .min-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .min-input[type=number] { -moz-appearance: textfield; }

    .min-label { font-size: 0.8rem; color: var(--muted); }

    .modal-divider {
      border: none;
      border-top: 1px solid var(--subtle);
      margin: 1.6rem 0 1.3rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
    }

    .btn-save {
      padding: 0.62rem 1.7rem;
      background: var(--tomato);
      color: #fff;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      border: none;
      cursor: pointer;
      transition: background 0.18s;
    }

    .btn-save:hover { background: var(--tomato-dk); }

    .btn-cancel {
      padding: 0.62rem 1.3rem;
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      border: 1.5px solid var(--subtle);
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
  </style>
</head>
<body>

  <div class="card">

    <!-- Header -->
    <div class="header">

    <div class="toolbar">

        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

    <!-- Timer ring -->

  <!-- Customize Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">Set Your Minutes</div>

      <div class="field">
        <label>🍅 Focus</label>
        <div class="field-input-wrap">
          <button class="stepper" data-target="inputFocus" data-dir="-1">−</button>
          <input class="min-input" type="number" id="inputFocus" min="1" max="99" value="25" />

  <script>
    const CIRCUMFERENCE = 2 * Math.PI * 115;

    const display    = document.getElementById('display');
    const modeLabel  = document.getElementById('modeLabel');
    const icon       = document.getElementById('icon');
    const startBtn   = document.getElementById('startBtn');
    const stopBtn    = document.getElementById('stopBtn');
    const resetBtn   = document.getElementById('resetBtn');
    const progress   = document.querySelector('.ring-progress');
    const breathe    = document.getElementById('breathe');
    const modeBtns   = document.querySelectorAll('.mode-btn');

    let totalSeconds = 25 * 60;
    let remaining    = totalSeconds;
    let timer        = null;
    let running      = false;
    let currentLabel = 'Focus';

    const hints = [
      'Breathe in… breathe out.',
      'You\'re doing great. Stay present.',
      'One breath at a time.',
      'Notice how you feel right now.',
      'Rest is productive too.',
    ];

    function formatTime(s) {
      const m   = Math.floor(s / 60).toString().padStart(2, '0');
      const sec = (s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    function updateRing() {
      const offset = CIRCUMFERENCE * (1 - remaining / totalSeconds);
      progress.style.strokeDashoffset = offset;
    }

    function setMode(minutes, label) {
      stop();
      totalSeconds  = minutes * 60;
      remaining     = totalSeconds;
      currentLabel  = label;
      display.textContent   = formatTime(remaining);
      modeLabel.textContent = label;
      progress.style.strokeDashoffset = 0;
      progress.classList.remove('done');
      icon.classList.remove('pulse');
      icon.textContent = label === 'Focus' ? '🍅' : '🌿';
      breathe.textContent = '';
    }

    function tick() {
      if (remaining <= 0) {
        clearInterval(timer);
        running = false;
        remaining = 0;
        display.textContent = '00:00';
        progress.classList.add('done');
        icon.classList.remove('pulse');
        startBtn.textContent = 'Start';
        breathe.textContent  = '✨ Well done! Take a moment.';
        playFinishSound();
        return;
      }
      remaining--;
      display.textContent = formatTime(remaining);
      updateRing();
      if (remaining % 30 === 0 && remaining > 0) {
        breathe.textContent = hints[Math.floor(Math.random() * hints.length)];
      }
    }

    function start() {
      if (running || remaining <= 0) return;
      running = true;
      startBtn.textContent = 'Running…';
      icon.classList.add('pulse');
      breathe.textContent = hints[0];
      timer = setInterval(tick, 1000);
    }

    function stop() {
      clearInterval(timer);
      running = false;
      startBtn.textContent = 'Start';
      icon.classList.remove('pulse');
    }

    function reset() {
      stop();
      remaining = totalSeconds;
      display.textContent = formatTime(remaining);
      progress.style.strokeDashoffset = 0;
      progress.classList.remove('done');
      breathe.textContent = '';
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click',  stop);
    resetBtn.addEventListener('click', reset);

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        setMode(+btn.dataset.minutes, btn.dataset.label);
      });
    });

    // ── Audio ──────────────────────────────────────────────
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playSoftChime(ctx, when = 0) {
      const freq = 880;
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, when);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.98, when + 1.2);
      gain.gain.setValueAtTime(0, when);
      gain.gain.linearRampToValueAtTime(0.22, when + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + 2.2);
      osc.start(when);
      osc.stop(when + 2.2);
    }

    function playGong(ctx, when = 0) {
      const layers = [
        { freq: 160, vol: 0.28, decay: 3.5 },
        { freq: 268, vol: 0.18, decay: 2.8 },
        { freq: 395, vol: 0.10, decay: 2.0 },
        { freq: 540, vol: 0.06, decay: 1.4 },
      ];
      layers.forEach(({ freq, vol, decay }) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        const lfo  = ctx.createOscillator();
        const lfoG = ctx.createGain();
        lfo.frequency.value = 5.5;
        lfoG.gain.value     = 1.8;
        lfo.connect(lfoG);
        lfoG.connect(osc.frequency);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, when);
        gain.gain.setValueAtTime(0, when);
        gain.gain.linearRampToValueAtTime(vol, when + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.0001, when + decay);
        lfo.start(when); osc.start(when);
        osc.stop(when + decay); lfo.stop(when + decay);
      });
    }

    function playFinishSound() {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      if (currentLabel === 'Focus') {
        playSoftChime(ctx, now);
      } else if (currentLabel === 'Short Break') {
        for (let i = 0; i < 3; i++) playGong(ctx, now + i * 2.2);
      } else {
        for (let i = 0; i < 5; i++) playGong(ctx, now + i * 2.2);
      }
    }

    document.addEventListener('click', () => getAudioCtx(), { once: true });

    // ── Customize Modal ────────────────────────────────────
    const customMins = { Focus: 25, 'Short Break': 5, 'Long Break': 15 };

    const modalOverlay = document.getElementById('modalOverlay');
    const customizeBtn = document.getElementById('customizeBtn');
    const modalCancel  = document.getElementById('modalCancel');
    const modalSave    = document.getElementById('modalSave');
    const inputFocus   = document.getElementById('inputFocus');
    const inputBreak   = document.getElementById('inputBreak');
    const inputRest    = document.getElementById('inputRest');

    function openModal() {
      inputFocus.value = customMins['Focus'];
      inputBreak.value = customMins['Short Break'];
      inputRest.value  = customMins['Long Break'];
      modalOverlay.classList.add('open');
    }

    function closeModal() { modalOverlay.classList.remove('open'); }

    function clamp(val, min, max) { return Math.min(max, Math.max(min, val)); }

    function saveModal() {
      customMins['Focus']       = clamp(parseInt(inputFocus.value) || 25, 1, 99);
      customMins['Short Break'] = clamp(parseInt(inputBreak.value) || 5,  1, 99);
      customMins['Long Break']  = clamp(parseInt(inputRest.value)  || 15, 1, 99);

      const names = { Focus: 'Focus', 'Short Break': 'Break', 'Long Break': 'Rest' };
      modeBtns.forEach(btn => {
        const label = btn.dataset.label;
        const mins  = customMins[label];
        btn.dataset.minutes  = mins;
        btn.textContent = `${names[label]}  ${mins}m`;
      });

      setMode(customMins[currentLabel], currentLabel);
      closeModal();
    }

    customizeBtn.addEventListener('click', openModal);
    modalCancel.addEventListener('click',  closeModal);
    modalSave.addEventListener('click',    saveModal);
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown',   e => { if (e.key === 'Escape') closeModal(); });

    document.querySelectorAll('.stepper').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.value = clamp((parseInt(input.value) || 0) + parseInt(btn.dataset.dir), 1, 99);
      });
    });

    // init
    progress.style.strokeDasharray  = CIRCUMFERENCE;
    progress.style.strokeDashoffset = 0;
  </script>
</body>
</html>
